name: Dusty
options:
  bundleIdPrefix: sh.toprak
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
packages:
  CleanerEngine:
    path: ../CleanerEngine
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  Dusty:
    type: application
    platform: macOS
    sources:
      - Dusty
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.toprak.dusty
        # Marketing + build version. The release workflow overrides these from the
        # git tag (build number must increase each release so Sparkle sees the update).
        MARKETING_VERSION: "1.5.0"
        CURRENT_PROJECT_VERSION: "10500"
        INFOPLIST_FILE: Dusty/Info.plist
        CODE_SIGN_ENTITLEMENTS: Dusty/Dusty.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Release:
          # Distribution builds must not carry the debug get-task-allow
          # entitlement, or notarization rejects them.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    dependencies:
      - package: CleanerEngine
        product: CleanerEngine
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: Dusty/Dusty.entitlements
schemes:
  Dusty:
    build:
      targets:
        Dusty: all
    run:
      config: Debug
