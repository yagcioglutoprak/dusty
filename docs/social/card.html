<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; overflow: hidden; }
  :root {
    --surface: #2a2c2e;
    --blue: #3478f6;
    --green: #34c759;
    --red: #ff5656;
    --white: #f4f4f4;
    --muted: #8a8b90;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    color: var(--white);
    position: relative;
    background:
      radial-gradient(1050px 680px at 80% 44%, rgba(52,120,246,0.11), rgba(52,120,246,0) 58%),
      radial-gradient(700px 700px at 6% -10%, rgba(255,86,86,0.06), rgba(255,86,86,0) 55%),
      linear-gradient(157deg, #141416 0%, #1a1a1c 58%, #161618 100%);
    -webkit-font-smoothing: antialiased;
  }
  .grain { position: absolute; inset: 0; opacity: 0.038; mix-blend-mode: overlay; pointer-events: none; }
  .wrap { position: absolute; inset: 0; display: flex; align-items: center; }

  .left { width: 60%; padding-left: 84px; }
  .brand { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
  .spark { width: 50px; height: 50px; filter: drop-shadow(0 3px 10px rgba(255,86,86,0.35)); }
  .wordmark { font-size: 66px; font-weight: 800; letter-spacing: -0.025em; line-height: 1; }

  .headline { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.16; max-width: 660px; }
  .headline .dim { color: var(--muted); font-weight: 600; }

  .chips { display: flex; gap: 13px; margin-top: 36px; }
  .chip {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 999px; padding: 11px 20px; font-size: 21px; font-weight: 600; color: #d9dade;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }

  .install {
    margin-top: 42px; display: inline-block;
    font-family: Menlo, "SF Mono", ui-monospace, monospace; font-size: 20px; color: #9a9ba0;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 13px; padding: 15px 22px;
    font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0;
  }
  .install .prompt { color: #5b5c61; }
  .install .flag { letter-spacing: 0.16em; }

  .right { position: absolute; right: 58px; top: 50%; transform: translateY(-50%); }
  .panel {
    height: 562px; display: block; border-radius: 24px;
    box-shadow: 0 44px 96px rgba(0,0,0,0.58), 0 10px 28px rgba(0,0,0,0.42);
  }
</style>
</head>
<body>
  <svg class="grain" width="1280" height="640">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>

  <div class="wrap">
    <div class="left">
      <div class="brand">
        <svg class="spark" viewBox="0 0 24 24" fill="#ff5656" aria-hidden="true">
          <path d="M12 0 C12 6.2 5.8 12 0 12 C5.8 12 12 17.8 12 24 C12 17.8 18.2 12 24 12 C18.2 12 12 6.2 12 0 Z"/>
        </svg>
        <div class="wordmark">Dusty</div>
      </div>

      <div class="headline">Reclaim disk space on your Mac,<br><span class="dim">without deleting the wrong files.</span></div>

      <div class="chips">
        <div class="chip"><span class="dot" style="background:#34c759"></span>Open source</div>
        <div class="chip"><span class="dot" style="background:#3478f6"></span>Allowlist-only</div>
        <div class="chip"><span class="dot" style="background:#ff5656"></span>Menu bar app</div>
      </div>

      <div class="install"><span class="prompt">$ </span>brew install <span class="flag">--</span>cask yagcioglutoprak/tap/dusty</div>
    </div>

    <div class="right">
      <img class="panel" src="file:///Users/toprakyagcioglu/Documents/mac_cleaner/docs/screenshots/panel.png" alt="Dusty panel">
    </div>
  </div>
</body>
</html>
