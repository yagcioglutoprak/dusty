name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Push runs use a per-commit group so rapid pushes (a release train) never
# cancel each other. A cancelled run renders the repo badge as "failing", so
# letting push runs complete keeps it honest. PR runs keep a per-ref group so
# force-pushes still skip redundant macOS minutes without affecting the badge.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.ref) || format('ci-push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  engine-tests:
    name: CleanerEngine tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests (Swift 6 mode, warnings are errors)
        working-directory: CleanerEngine
        run: swift test -Xswiftc -warnings-as-errors

  app-build:
    name: Build app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build (no signing)
        working-directory: Dusty
        run: |
          xcodebuild \
            -project Dusty.xcodeproj \
            -scheme Dusty \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build
