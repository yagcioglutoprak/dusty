name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Releases are signed and notarized when the signing secrets are present.
      # When they are absent the job FAILS, so a tag never looks successful
      # without artifacts. To allow an intentional no-op (e.g. while bootstrapping
      # before docs/SIGNING.md is done), set repository variable
      # ALLOW_UNSIGNED_RELEASE_SKIP=true. See docs/SIGNING.md.
      - id: check
        env:
          CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          ALLOW_SKIP: ${{ vars.ALLOW_UNSIGNED_RELEASE_SKIP }}
        run: |
          if [ -n "$CERT" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          elif [ "$ALLOW_SKIP" = "true" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "No signing secrets, and ALLOW_UNSIGNED_RELEASE_SKIP=true. Skipping signed release."
          else
            echo "::error::No signing secrets configured (MACOS_CERT_P12_BASE64). Configure signing/notarization secrets, or set repository variable ALLOW_UNSIGNED_RELEASE_SKIP=true to allow an intentional no-op release. See docs/SIGNING.md."
            exit 1
          fi

      - name: Import Developer ID certificate
        if: steps.check.outputs.ok == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: dusty-ci-keychain
        run: |
          KEYCHAIN="$RUNNER_TEMP/dusty.keychain-db"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"

      - name: Derive version and build number
        if: steps.check.outputs.ok == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          IFS=. read -r MAJ MIN PAT <<< "$VERSION"
          # Monotonic integer build from semver (minor/patch assumed < 100). Sparkle
          # compares this against the installed CFBundleVersion to detect updates.
          BUILD=$(( ${MAJ:-0} * 10000 + ${MIN:-0} * 100 + ${PAT:-0} ))
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD=$BUILD" >> "$GITHUB_ENV"
          echo "Releasing $VERSION (build $BUILD)"

      - name: Build signed app
        if: steps.check.outputs.ok == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: Dusty
        run: |
          xcodebuild \
            -project Dusty.xcodeproj \
            -scheme Dusty \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            build

      - name: Embed CLI and re-sign inside-out
        if: steps.check.outputs.ok == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          # The dusty CLI ships inside the app bundle. It goes in Contents/Helpers,
          # not Contents/MacOS: a case-insensitive filesystem would collide
          # "dusty" with the "Dusty" main executable there.
          swift build -c release --product dusty --package-path CleanerEngine
          APP="Dusty/build/Build/Products/Release/Dusty.app"
          mkdir -p "$APP/Contents/Helpers"
          cp CleanerEngine/.build/release/dusty "$APP/Contents/Helpers/dusty"
          # Sparkle's nested helpers build ad-hoc signed; notarization rejects
          # them unless re-signed with the Developer ID, deepest first, app last.
          SPK="$APP/Contents/Frameworks/Sparkle.framework"
          for item in "$SPK"/Versions/B/XPCServices/*.xpc "$SPK"/Versions/B/Autoupdate \
                      "$SPK"/Versions/B/Updater.app "$SPK" "$APP/Contents/Helpers/dusty"; do
            codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$item"
          done
          codesign --force --options runtime --timestamp \
            --entitlements Dusty/Dusty/Dusty.entitlements --sign "$SIGN_IDENTITY" "$APP"
          codesign --verify --deep --strict "$APP"

      - name: Package, notarize, staple
        if: steps.check.outputs.ok == 'true'
        env:
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          TAG: ${{ github.ref_name }}
        working-directory: Dusty
        run: |
          VERSION="${TAG#v}"
          APP="build/Build/Products/Release/Dusty.app"
          echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          STAGE="$RUNNER_TEMP/dmg"; mkdir -p "$STAGE"
          ditto "$APP" "$STAGE/Dusty.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Dusty" -srcfolder "$STAGE" -ov -format UDZO \
            "$RUNNER_TEMP/Dusty-$VERSION.dmg"
          xcrun notarytool submit "$RUNNER_TEMP/Dusty-$VERSION.dmg" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$RUNNER_TEMP/Dusty-$VERSION.dmg"
          xcrun stapler staple "$APP" || true
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/Dusty-$VERSION.zip"
          shasum -a 256 "$RUNNER_TEMP/Dusty-$VERSION.dmg" | awk '{print $1}' > "$RUNNER_TEMP/dmg.sha256"
          rm "$RUNNER_TEMP/notary.p8"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate Sparkle appcast
        if: steps.check.outputs.ok == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "${SPARKLE_PRIVATE_KEY:-}" ]; then
            echo "SPARKLE_PRIVATE_KEY not set; skipping appcast (auto-update feed not published). See docs/UPDATES.md."
            exit 0
          fi
          SIGN_UPDATE="$(find Dusty/build/SourcePackages/artifacts -path '*sparkle/Sparkle/bin/sign_update' | head -1)"
          DMG="$RUNNER_TEMP/Dusty-$VERSION.dmg"
          URL="https://github.com/yagcioglutoprak/dusty/releases/download/$TAG/Dusty-$VERSION.dmg"
          SIGN_UPDATE="$SIGN_UPDATE" \
          RELEASE_NOTES_URL="https://github.com/yagcioglutoprak/dusty/releases/tag/$TAG" \
            scripts/make-appcast.sh "$DMG" "$VERSION" "$BUILD" "$URL" "$RUNNER_TEMP/appcast.xml"

      - name: Publish GitHub release
        if: steps.check.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          ASSETS=( "$RUNNER_TEMP/Dusty-$VERSION.dmg" "$RUNNER_TEMP/Dusty-$VERSION.zip" )
          [ -f "$RUNNER_TEMP/appcast.xml" ] && ASSETS+=( "$RUNNER_TEMP/appcast.xml" )
          gh release create "$TAG" \
            "${ASSETS[@]}" \
            --title "Dusty $TAG" \
            --generate-notes

      - name: Update Homebrew tap
        if: steps.check.outputs.ok == 'true'
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "TAP_TOKEN not set, skipping tap update."
            exit 0
          fi
          SHA="$(cat "$RUNNER_TEMP/dmg.sha256")"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/yagcioglutoprak/homebrew-tap.git" "$RUNNER_TEMP/tap"
          mkdir -p "$RUNNER_TEMP/tap/Casks"
          sed -e "s/{{VERSION}}/$VERSION/g" -e "s/{{SHA256}}/$SHA/g" \
            homebrew/dusty.rb > "$RUNNER_TEMP/tap/Casks/dusty.rb"
          cd "$RUNNER_TEMP/tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/dusty.rb
          git commit -m "dusty $VERSION"
          git push
